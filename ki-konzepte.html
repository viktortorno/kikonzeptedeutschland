document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nospace;font-size:10.5px;letter-spacing:.08em;color:#8A8A8A;margin-top:4px;text-transform:uppercase\">⌀ bei Kunden<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== MARQUEE ===================== -->\n<div aria-hidden=\"true\" style=\"border-top:1px solid rgba(10,10,10,.12);border-bottom:1px solid rgba(10,10,10,.12);overflow:hidden;padding:15px 0;margin-top:18px\">\n  <div style=\"display:flex;width:max-content;animation:vtmarq 34s linear infinite;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:#0A0A0A\">\n    <span style=\"display:flex;gap:34px;padding-right:34px\"><span>Voice Agents<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>KI-Chatbots<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Corporate LLM<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Prozess-Automation<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Onboarding<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Marketing-Automation<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>KI-Agenten<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><\u002Fspan>\n    <span style=\"display:flex;gap:34px;padding-right:34px\"><span>Voice Agents<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>KI-Chatbots<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Corporate LLM<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Prozess-Automation<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Onboarding<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>Marketing-Automation<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><span>KI-Agenten<\u002Fspan><span style=\"color:#0F3B2E\">/<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===================== MANIFEST (INK) ===================== -->\n<section style=\"background:#0A0A0A;color:#F5F4F0;padding:90px 0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#4FBE86;display:flex;align-items:center;gap:14px;margin-bottom:30px\"><span style=\"width:28px;height:1px;background:#4FBE86\"><\u002Fspan>Der Ausgangspunkt<\u002Fdiv>\n    <blockquote data-reveal=\"\" style=\"margin:0;font-size:clamp(30px,4.2vw,52px);font-weight:600;line-height:1.12;letter-spacing:-.02em;max-width:20ch\">Deutschland hat kein Innovationsproblem.<br><span style=\"color:#8A8A8A\">Sondern ein<\u002Fspan> <span style=\"color:#4FBE86\">Umsetzungsproblem.<\u002Fspan><\u002Fblockquote>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:34px;margin-top:54px\">\n      <div data-reveal=\"\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:12px\">01 / PROBLEM-FIRST<\u002Fdiv>\n        <p style=\"margin:0;color:rgba(245,244,240,.82);font-size:16px;line-height:1.65\">Die Frage ist nicht „Welche KI-Tools gibt es?\", sondern „Welches Problem blockiert mein Wachstum?\". Wir verkaufen Ergebnisse — keine Tools.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:12px\">02 / KI IST EIN MARATHON<\u002Fdiv>\n        <p style=\"margin:0;color:rgba(245,244,240,.82);font-size:16px;line-height:1.65\">Wer heute mit 80&nbsp;% startet, kommt weiter als jemand, der in zwei Jahren mit 100&nbsp;% beginnt. Vorsprung entsteht durch Momentum, nicht durch Perfektion.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:12px\">03 / DONE-FOR-YOU<\u002Fdiv>\n        <p style=\"margin:0;color:rgba(245,244,240,.82);font-size:16px;line-height:1.65\">Wir erkennen die Chancen, priorisieren sie nach ROI und implementieren die Systeme — bis sie im Regelbetrieb laufen. Kein PowerPoint.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== KONZEPTE HEADER ===================== -->\n<section id=\"konzepte\" style=\"max-width:1180px;margin:0 auto;padding:90px 32px 10px\">\n  <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#0F3B2E;display:flex;align-items:center;gap:14px;margin-bottom:24px\"><span style=\"width:28px;height:1px;background:#0F3B2E\"><\u002Fspan>Die sieben Kern-Konzepte<\u002Fdiv>\n  <h2 data-reveal=\"\" style=\"font-size:clamp(32px,4.6vw,54px);font-weight:600;line-height:1.05;letter-spacing:-.025em;margin:0;max-width:18ch\">Was sich heute schon<br>automatisieren lässt.<\u002Fh2>\n  <p data-reveal=\"\" style=\"font-size:18px;color:#333;max-width:52ch;margin:22px 0 0\">Jedes Konzept folgt demselben Muster: das echte Problem, die Lösung, ein konkretes Kundenbeispiel und das messbare Ergebnis.<\u002Fp>\n<\u002Fsection>\n\n<!-- ===================== §01 VOICE AGENTS ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px\">\n  <div style=\"border:1px solid rgba(10,10,10,.14);border-radius:10px;overflow:hidden;background:#fff;display:grid;grid-template-columns:1.05fr .95fr\">\n    <div style=\"padding:44px 46px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#0F3B2E\">§01<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#595959\">Voice Agents<\u002Fspan>\n        <i data-lucide=\"phone-call\" style=\"width:18px;height:18px;color:#0A0A0A;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">KI-Telefonassistenten, die jedes Gespräch übernehmen.<\u002Fh3>\n      <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#333;line-height:1.6\">Jeder verpasste Anruf ist ein verlorener Auftrag. In der Stoßzeit klingelt es durch, abends nimmt niemand ab — und tausende alte Leads liegen ungenutzt in der Datenbank.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"margin-bottom:20px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#0F3B2E\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#1A1A1A;line-height:1.6\">Ein Voice Agent nimmt ab, klärt das Anliegen, qualifiziert und bucht Termine — und ruft alte Leads aktiv zurück. Inbound wie outbound, rund um die Uhr, in natürlicher Stimme.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-left:2px solid #0F3B2E;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#595959\">BEISPIEL · FALLSCHIRMSPORT GREFRATH<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:#333;line-height:1.6\">Anrufflut bei Wetterfragen. Der Geschäftsführer pflegt den Sprung-Status, der Voice Agent liest ihn live aus und informiert minutengenau. Vier Stunden nach dem Sprung geht automatisch die WhatsApp-Bewertungsbitte raus.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px;margin-bottom:26px\">\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"25\">0<\u002Fspan> Std.<\u002Fdiv><div style=\"font-size:13px;color:#595959\">pro Woche gespart<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-si =\"display:flex;flex-direction:column;gap:12px\">\n        <div data-reveal=\"\" style=\"align-self:flex-end;max-width:80%;background:#0A0A0A;color:#F5F4F0;border-radius:12px 12px 3px 12px;padding:11px 15px;font-size:14px\">Habt ihr das auch in Edelstahl?<\u002Fdiv>\n        <div data-reveal=\"\" style=\"align-self:flex-start;max-width:85%;background:#fff;border:1px solid rgba(10,10,10,.14);border-radius:12px 12px 12px 3px;padding:11px 15px;font-size:14px;color:#1A1A1A\">Ja — in drei Stärken. Lieferzeit 5–7 Tage.<br><span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#0F3B2E\">↳ Quelle: Produktkatalog · S.&nbsp;14<\u002Fspan><\u002Fdiv>\n        <div data-reveal=\"\" style=\"align-self:flex-start;display:flex;gap:5px;background:#fff;border:1px solid rgba(10,10,10,.14);border-radius:12px;padding:12px 15px;width:fit-content\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#8A8A8A;animation:vtdot 1.2s infinite\"><\u002Fspan>\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#8A8A8A;animation:vtdot 1.2s infinite .2s\"><\u002Fspan>\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#8A8A8A;animation:vtdot 1.2s infinite .4s\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:44px 46px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#0F3B2E\">§02<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#595959\">KI-Chatbots<\u002Fspan>\n        <i data-lucide=\"message-square\" style=\"width:18px;height:18px;color:#0A0A0A;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">RAG-Chatbots, die aus deinem Wissen antworten.<\u002Fh3>\n      <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#333;line-height:1.6\">Alte, regelbasierte Bots geben auswendig gelernte Floskeln. Kunden fragen immer wieder dasselbe, dein Team beantwortet dieselben Mails — Tag für Tag.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"margin-bottom:20px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#0F3B2E\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#1A1A1A;line-height:1.6\">Intelligente RAG-Chatbots mit Wissensdatenbank: Sie antworten 24/7 aus deinen Dokumenten — mit Quelle —, qualifizieren Leads und leiten nur das weiter, was wirklich einen Menschen braucht.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-left:2px solid #0F3B2E;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#595959\">BEISPIEL · INTERNE FILIALEN<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:#333;line-height:1.6\">Filialen waren durch Beratung vor Ort überlastet und mussten parallel ans Telefon. Jetzt fängt der Bot Standardfragen ab, nimmt das Anliegen auf — gemeldet wird am selben Tag.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px;margin-bottom:26px\">\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">24/7<\u002Fdiv><div style=\"font-size:13px;color:#595959\">First-Level-Support<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">&lt;&nbsp;<span data-count=\"24\">0<\u002Fspan>h<\u002Fdiv><div style=\"font-size:13px;color:#595959\">Reaktionszeit<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"80\">0<\u002Fspan>%<\u002Fdiv><div style=\"font-size:13px;color:#595959\">Standardfragen automatisch<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Website-Support<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Interner Support<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Lead-Qualifizierung<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">WhatsApp-Bot<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== §03 CORPORATE LLM (INK) ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px\">\n  <div style=\"border:1px solid rgba(245,244,240,.12);border-radius:10px;overflow:hidden;background:#0A0A0A;color:#F5F4F0;display:grid;grid-template-columns:1.05fr .95fr\">\n    <div style=\"padding:44px 46px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#4FBE86\">§03<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8A8A8A\">Corpora \">Hosting in Deutschland<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#4FBE86;letter-spacing:-.02em\">0<\u002Fdiv><div style=\"font-size:13px;color:#8A8A8A\">IP-Abfluss<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#4FBE86;letter-spacing:-.02em\">1<\u002Fdiv><div style=\"font-size:13px;color:#8A8A8A\">System fürs ganze Team<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Internes Wissen<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Eigene GPTs<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Dokumentenanalyse<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">EU AI Act<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(245,244,240,.12);padding:44px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:30px;align-self:flex-start\">WISSEN → KERN → ANTWORT<\u002Fdiv>\n      <div style=\"position:relative;width:100%;max-width:300px;height:180px;display:flex;align-items:center;justify-content:center\">\n        <div style=\"position:absolute;left:0;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:12px\">\n          <span style=\"width:42px;height:30px;border:1px solid rgba(245,244,240,.3);border-radius:4px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#8A8A8A;animation:vtfeed 2.4s ease-in infinite\">PDF<\u002Fspan>\n          <span style=\"width:42px;height:30px;border:1px solid rgba(245,244,240,.3);border-radius:4px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#8A8A8A;animation:vtfeed 2.4s ease-in infinite .8s\">DOCX<\u002Fspan>\n          <span style=\"width:42px;height:30px;border:1px solid rgba(245,244,240,.3);border-radius:4px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#8A8A8A;animation:vtfeed 2.4s ease-in infinite 1.6s\">CRM<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"width:78px;height:78px;border-radius:50%;background:#0F3B2E;border:1px solid #4FBE86;display:grid;place-items:center;animation:vtcore 2.6s ease-in-out infinite\"><i data-lucide=\"sparkles\" style=\"width:30px;height:30px;color:#4FBE86\"><\u002Fi><\u002Fdiv>\n        <div style=\"position:absolute;right:0;top:50%;transform:translateY(-50%);background:#4FBE86;color:#0A0A0A;border-radius:6px;padding:9px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;max-width:96px;line-height:1.4\">Antwort + Quelle<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== §04 PROZESSAUTOMATISIERUNG ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px\">\n  <div style=\"border:1px solid rgba(10,10,10,.14);border-radius:10px;overflow:hidden;background:#fff\">\n    <div style=\"padding:44px 46px 30px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#0F3B2E\">§04<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#595959\">Prozessautomatisierung · AI Workflows<\u002Fspan>\n        <i data-lucide=\"workflow\" style=\"width:18px;height:18px;color:#0A0A0A;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start\">\n        <div>\n          <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">Die unsichtbaren Workflows, die hunderte Stunden sparen.<\u002Fh3>\n          <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#333;line-height:1.6\">Daten von A nach B tippen, Belege abheften, Angebote zusammenklicken, Mails sortieren. 15+ Stunden pro Woche und Mitarbeiter — für Arbeit, die kein Mensch machen müsste.<\u002Fp><\u002Fdiv>\n          <div data-reveal=\"\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#0F3B2E\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#1A1A1A;line-height:1.6\">Wir verbinden eure Tools über n8n, Make &amp; APIs: neue Leads landen automatisch im CRM, Follow-ups laufen von selbst, Belege werden per OCR erfasst, Angebote und Rechnungen entstehen automatisch.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div data-reveal=\"\" style=\"border-left:2px solid #0F3B2E;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#595959\">BEISPIEL · HANDWERK<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:#333;line-height:1.6\">Anhand von Entfernung und Hausgröße berechnet die Automatisierung sofort einen Preisrahmen, den der Kunde direkt bekommt. Bei einem Content-Kunden ersetzt eine Prompt-Bibliothek 30 Minuten Handarbeit durch einen Klick.<\u002Fp><\u002Fdiv>\n          <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px\">\n            <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"18\">0<\u002Fspan> Std.<\u002Fdiv><div style=\"font-size:13px;color:#595959\">pro Woche gespart<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"80\">0<\u002Fspan>%<\u002Fdiv><div style=\"font-size:13px;color:#595959\">schnellere Produktion<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">−<span data-count=\"30\">0<\u002Fspan>%<\u002Fdiv><div style=\"font-size:13px;color:#595959\">Fehlerquote<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- animated workflow rail -->\n    <div data-reveal=\"\" style=\"background:#F5F4F0;border-top:1px solid rgba(10,10,10,.12);padding:34px 46px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:22px\">EIN DURCHLAUF · ANFRAGE → ABSCHLUSS<\u002Fdiv>\n      <div style=\"position:relative;display:flex;align-items:center;justify-content:space-between;gap:8px\">\n        <div style=\"position:absolute;left:0;right:0;top:50%;height:2px;background:rgba(10,10,10,.12)\"><\u002Fdiv>\n        <div style=\"position:absolute;left:0;top:50%;height:2px;width:100%;background:#0F3B2E;transform-origin:left;transform:scaleX(0);animation:vtrail 5s linear infinite\"><\u002Fdiv>\n        <div style=\"position:absolute;top:calc(50% - 11px);width:22px;height:22px;border-radius:50%;background:#0A0A0A;border:2px solid #F5F4F0;animation:vtpacket 5s linear infinite\"><\u002Fdiv>\n        <div style=\"position:relative;background:#fff;border:1px sol an style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Belegerkennung (OCR)<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Angebote &amp; Rechnungen<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">DATEV-Export<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Meeting-Protokolle<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== §05 ONBOARDING ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px\">\n  <div style=\"border:1px solid rgba(10,10,10,.14);border-radius:10px;overflow:hidden;background:#fff;display:grid;grid-template-columns:.95fr 1.05fr\">\n    <div style=\"background:#F5F4F0;border-right:1px solid rgba(10,10,10,.12);padding:44px 40px;display:flex;flex-direction:column;justify-content:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:20px\">ONBOARDING · BAUT SICH SELBST<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px\">\n        <div data-reveal=\"\" style=\"background:#fff;border:1px solid rgba(10,10,10,.14);border-radius:7px;padding:12px 14px;display:flex;align-items:center;gap:12px\"><span style=\"width:20px;height:20px;border-radius:5px;background:#0F3B2E;display:grid;place-items:center;flex:none;animation:vtcheck 4s infinite\"><i data-lucide=\"check\" style=\"width:13px;height:13p e=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#595959\">Onboarding-Automatisierung<\u002Fspan>\n        <i data-lucide=\"user-check\" style=\"width:18px;height:18px;color:#0A0A0A;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">Onboarding, das sich selbst aufbaut.<\u002Fh3>\n      <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#333;line-height:1.6\">Jeder Start kostet Zeit: Kundeninfos sammeln, Verträge ablegen, Zugänge anlegen, neue Mitarbeiter einarbeiten — manuell, jedes Mal von vorne.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"margin-bottom:20px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#0F3B2E\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#1A1A1A;line-height:1.6\">Ein Onboarding-Agent sammelt alle Infos aus Gespräch, Vertrag und Formularen, erstellt das komplette Onboarding und führt Schritt für Schritt — für Kunden wie für Mitarbeiter.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-left:2px solid #0F3B2E;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#595959\">BEISPIEL · WEBSITEENTWICKLER<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:#333;line-height:1.6\">Vom Onboarding bis zur fertigen Website: Das Gespräch wird zusammengefasst, alle Kundeninfos erfasst und fließen direkt in die Erstellung ein — mindestens zwei Stunden weniger pro Projekt.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px;margin-bottom:26px\">\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">≥&nbsp;<span data-count=\"2\">0<\u002Fspan> Std.<\u002Fdiv><div style=\"font-size:13px;color:#595959\">pro Projekt gespart<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">0<\u002Fdiv><div style=\"font-size:13px;color:#595959\">vergessene Schritte<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">1<\u002Fdiv><div style=\"font-size:13px;color:#595959\">strukturierter Start<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Kunden-Onboarding<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Mitarbeiter-Einarbeitung<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Checklisten &amp; Zugänge<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Lernplattform<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== §06 MARKETING-AUTOMATION ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px\">\n  <div style=\"border:1px solid rgba(10,10,10,.14);border-radius:10px;overflow:hidden;background:#fff;display:grid;grid-template-columns:1.05fr .95fr\">\n    <div style=\"padding:44px 46px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#0F3B2E\">§06<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#595959\">Marketing-Automation<\u002Fspan>\n        <i data-lucide=\"megaphone\" style=\"width:18px;height:18px;color:#0A0A0A;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">Ein Marketing-Team aus Automationen.<\u002Fh3>\n      <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#333;line-height:1.6\">Sichtbarkeit kostet Zeit, die du nicht hast: Posts schreiben, Leads anreichern, Outreach personalisieren, Ads überwachen, Bewertungen einsammeln.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"margin-bottom:20px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#0F3B2E\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#1A1A1A;line-height:1.6\">Automationen übernehmen den Maschinenraum: Social-Posts, Lead-Enrichment, hyper-personalisierte Outreach-Kampagnen, Ads erstellen/auswerten/beenden, Bewertungs- und Newsletter-Flows.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-left:2px solid #0F3B2E;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#595959\">BEISPIEL · BEWERTUNGS-FLOW<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:#333;line-height:1.6\">Nach jedem Termin geht automatisch die Bewertungsbitte raus. Über 414 Bewertungen kamen so zusammen — ohne dass jemand nachhaken musste.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px;margin-bottom:26px\">\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"414\">0<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;color:#595959\">Bewertungen automatisch<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\"><span data-count=\"5\">0<\u002Fspan>×<\u002Fdiv><div style=\"font-size:13px;color:#595959\">mehr Content-Output<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#0F3B2E;letter-spacing:-.02em\">24/7<\u002Fdiv><div style=\"font-size:13px;color:#595959\">Outreach läuft<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Social-Posts<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Lead-Enrichment<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Outreach<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Ads<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#333;border:1px solid rgba(10,10,10,.18);border-radius:100px;padding:6px 13px\">Newsletter<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#F5F4F0;border-left:1px solid rgba(10,10,10,.12);padding:44px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:24px;align-self:flex-start\">EIN BEITRAG → ALLE KANÄLE<\u002Fdiv>\n      <div style=\"position:relative;width:230px;height:180px\">\n        <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:64px;height:64px;border-radius:50%;background:#0A0A0A;display:grid;place-items:center;z-index:2\"><i data-lucide=\"sparkles\" style=\"width:26px;height:26px;color:#4FBE86\"><\u002Fi><\u002Fdiv>\n        <span style=\"--fx:-78px;--fy:-58px;position:absolute;left:50%;top:50%;width:54px;height:30px;margin:-15px 0 0 -27px;border:1px solid rgba(10,10,10,.2);border-radius:5px;background:#fff;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#595959;animation:vtfan 3s ease-in-out infinite\">LinkedIn<\u002Fspan>\n        <span style=\"--fx:80px;--fy:-58px;position:absolute;left:50%;top:50%;width:54px;height:30px;margin:-15px 0 0 -27px;border:1px solid rgba(10,10,10,.2);border-radius:5px;background:#fff;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#595959;animation:vtfan 3s ease-in-out infinite .3s\">Insta<\u002Fspan>\n        <span style=\"--fx:-86px;--fy:52px;position:absolute;left:50%;top:50%;width:54px;height:30px;margin:-15px 0 0 -27px;border:1px solid rgba(10,10,10,.2);border-radius:5px;background:#fff;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#595959;animation:vtfan 3s ease-in-out infinite .6s\">E-Mail<\u002Fspan>\n        <span style=\"--fx:84px;--fy:52px;position:absolute;left:50%;top:50%;width:54px;height:30px;margin:-15px 0 0 -27px;border:1px solid rgba(10,10,10,.2);border-radius:5px;background:#fff;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;color:#595959;animation:vtfan 3s ease-in-out infinite .9s\">Blog<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== §07 KI-AGENTEN (INK) ===================== -->\n<section data-concept=\"\" style=\"max-width:1180px;margin:0 auto;padding:48px 32px 70px\">\n  <div style=\"border:1px solid rgba(245,244,240,.12);border-radius:10px;overflow:hidden;background:#0A0A0A;color:#F5F4F0;display:grid;grid-template-columns:.95fr 1.05fr\">\n    <div style=\"border-right:1px solid rgba(245,244,240,.12);padding:44px 40px;display:flex;flex-direction:column;justify-content:center;align-items:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:30px;align-self:flex-start\">MASTER-AGENT + SPEZIALISTEN<\u002Fdiv>\n      <div style=\"position:relative;width:240px;height:200px\">\n        <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:74px;height:74px;border-radius:14px;background:#0F3B2E;border:1px solid #4FBE86;display:grid;place-items:center;text-align:center;z-index:2\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#4FBE86;line-height:1.3\">MASTER<br>AGENT<\u002Fspan><\u002Fdiv>\n        <span style=\"position:absolute;left:8px;top:6px;width:62px;height:38px;border:1px solid rgba(245,244,240,.25);border-radius:8px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#8A8A8A;text-align:center;animation:vtpulse 3s ease-in-out infinite\">Outbound<\u002Fspan>\n        <span style=\"position:absolute;right:8px;top:6px;width:62px;height:38px;border:1px solid rgba(245,244,240,.25);border-radius:8px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#8A8A8A;text-align:center;animation:vtpulse 3s ease-in-out infinite .5s\">Follow-up<\u002Fspan>\n        <span style=\"position:absolute;left:8px;bottom:6px;width:62px;height:38px;border:1px solid rgba(245,244,240,.25);border-radius:8px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#8A8A8A;text-align:center;animation:vtpulse 3s ease-in-out infinite 1s\">Research<\u002Fspan>\n        <span style=\"position:absolute;right:8px;bottom:6px;width:62px;height:38px;border:1px solid rgba(245,244,240,.25);border-radius:8px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:8.5px;color:#8A8A8A;text-align:center;animation:vtpulse 3s ease-in-out infinite 1.5s\">Support<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"padding:44px 46px\">\n      <div data-reveal=\"\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#4FBE86\">§07<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8A8A8A\">KI-Agenten<\u002Fspan>\n        <i data-lucide=\"bot\" style=\"width:18px;height:18px;color:#F5F4F0;margin-left:auto\"><\u002Fi>\n      <\u002Fdiv>\n      <h3 data-reveal=\"\" style=\"font-size:31px;font-weight:600;line-height:1.1;letter-spacing:-.02em;margin:0 0 24px\">Master-Agent und Spezialisten — dein digitales Team.<\u002Fh3>\n      <div data-reveal=\"\" style=\"margin-bottom:16px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A\">PROBLEM<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:rgba(245,244,240,.78);line-height:1.6\">Einzelne Automationen helfen. Echte Hebel entstehen, wenn Agenten zusammenarbeiten: einer plant, einer recherchiert, einer schreibt, einer ruft an.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"margin-bottom:20px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#4FBE86\">LÖSUNG<\u002Fspan><p style=\"margin:6px 0 0;font-size:16px;color:#F5F4F0;line-height:1.6\">Ein Master-Agent koordiniert spezialisierte Agenten: Outbound, Leadreaktivierung, Follow-up, First-Level-Support, Meeting-Analyse, Daten-Auswertung, Personal Assistant. Sie planen, entscheiden und handeln über eure Systeme hinweg.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"border-left:2px solid #4FBE86;padding:4px 0 4px 18px;margin-bottom:24px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#8A8A8A\">BEISPIEL · ANGEBOT AUS DEM GESPRÄCH<\u002Fspan><p style=\"margin:6px 0 0;font-size:15px;color:rgba(245,244,240,.78);line-height:1.6\">Der Agent zeichnet das Verkaufsgespräch auf und erstellt das Angebot nach den Worten des Kunden. Ein Follow-up-Agent reaktiviert 1–24 Monate alte Leads.<\u002Fp><\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:26px;margin-bottom:26px\">\n        <div><div style=\"font-size:28px;font-weight:600;color:#4FBE86;letter-spacing:-.02em\">+<span data-count=\"30\">0<\u002Fspan>%<\u002Fdiv><div style=\"font-size:13px;color:#8A8A8A\">Jahresumsatz · Follow-up<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#4FBE86;letter-spacing:-.02em\">1–24<\u002Fdiv><div style=\"font-size:13px;color:#8A8A8A\">Monate alte Leads reaktiviert<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:28px;font-weight:600;color:#4FBE86;letter-spacing:-.02em\">24/7<\u002Fdiv><div style=\"font-size:13px;color:#8A8A8A\">arbeiten parallel<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Master-Agent<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Deep Research<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Data Analyst<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Meeting Manager<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Personal Assistant<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PROZESS-MATRIX ===================== -->\n<section id=\"matrix\" style=\"background:#fff;border-top:1px solid rgba(10,10,10,.12);border-bottom:1px solid rgba(10,10,10,.12)\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:90px 32px\">\n    <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#0F3B2E;display:flex;align-items:center;gap:14px;margin-bottom:24px\"><span style=\"width:28px;height:1px;background:#0F3B2E\"><\u002Fspan>Die Prozess-Matrix · 9 Bereiche<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-size:clamp(30px,4.4vw,50px);font-weight:600;line-height:1.06;letter-spacing:-.025em;margin:0;max-width:20ch\">Fast jeder Prozess<br>lässt sich automatisieren.<\u002Fh2>\n    <p data-reveal=\"\" style=\"font-size:18px;color:#333;max-width:54ch;margin:22px 0 40px\">Wähle einen Bereich — und sieh konkret, was dort heute schon läuft. Kein Bereich bleibt außen vor.<\u002Fp>\n\n    <div data-reveal=\"\" style=\"display:grid;grid-template-columns:.85fr 1.15fr;gap:1px;background:rgba(10,10,10,.12);border:1px solid rgba(10,10,10,.12);border-radius:10px;overflow:hidden\">\n      <!-- department list -->\n      <div style=\"background:#fff;display:flex;flex-direction:column\">\n        <sc-for list=\"{{ depts }}\" as=\"d\" hint-placeholder-count=\"9\">\n          <button onclick=\"{{ d.onClick }}\" style=\"{{ d.btnStyle }}\" style-hover=\"background:#F5F4F0\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#8A8A8A;width:24px;flex:none\">{{ d.n }}<\u002Fspan>\n            <span style=\"font-size:15px;font-weight:500;text-align:left;flex:1\">{{ d.name }}<\u002Fspan>\n            <sc-if value=\"{{ d.isActive }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:6px;height:6px;border-radius:50%;background:#0F3B2E;flex:none\"><\u002Fspan><\u002Fsc-if>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <!-- detail panel -->\n      <div style=\"background:#F5F4F0;padding:34px 38px\">\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:8px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:#0F3B2E\">{{ activeNum }}<\u002Fspan>\n          <h3 style=\"font-size:24px;font-weight:600;letter-spacing:-.02em;margin:0\">{{ activeName }}<\u002Fh3>\n        <\u002Fdiv>\n        <p style=\"font-size:15px;color:#595959;margin:0 0 24px\">{{ activeDesc }}<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px 22px\">\n          <sc-for list=\"{{ activeProcs }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px dashed rgba(10,10,10,.14)\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#0F3B2E;margin-top:2px;flex:none\">{{ p.idx }}<\u002Fspan>\n              <span style=\"font-size:14px;color:#1A1A1A;line-height:1.4\">{{ p.name }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== INDIVIDUELL / BEDARF ===================== -->\n<section id=\"individuell\" style=\"background:#0A0A0A;color:#F5F4F0;padding:90px 0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#4FBE86;display:flex;align-items:center;gap:14px;margin-bottom:24px\"><span style=\"width:28px;height:1px;background:#4FBE86\"><\u002Fspan>Maßgeschneidert · Kein Tool-Zwang<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-size:clamp(30px,4.4vw,52px);font-weight:600;line-height:1.06;letter-spacing:-.025em;margin:0;max-width:20ch\">Nicht das Unternehmen an die Software anpassen.<br><span style=\"color:#4FBE86\">Die Software an das Unternehmen.<\u002Fspan><\u002Fh2>\n    <p data-reveal=\"\" style=\"font-size:18px;color:rgba(245,244,240,.8);max-width:58ch;margin:22px 0 0\">Standard-Tools können vieles — aber selten genau das, was dein Betrieb braucht. Wir starten beim Bedarf, nicht beim Tool. Heute lässt sich jeder Workflow, jedes CRM und jede Oberfläche individuell bauen — passgenau auf eure Abläufe statt auf den Durchschnitt.<\u002Fp>\n\n    <!-- 4-step process -->\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(245,244,240,.14);border:1px solid rgba(245,244,240,.14);border-radius:10px;overflow:hidden;margin-top:46px\">\n      <div data-reveal=\"\" style=\"background:#0A0A0A;padding:28px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:14px\">01 / BEDARF<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Bedarf erfassen<\u002Fh3>\n        <p style=\"font-size:14.5px;color:rgba(245,244,240,.72);line-height:1.55;margin:0\">Wir schauen uns eure Abläufe an und finden den Engpass, der wirklich Geld und Zeit kostet — nicht das, was gerade im Trend ist.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#0A0A0A;padding:28px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:14px\">02 / TEST<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Schnell testen<\u002Fh3>\n        <p style=\"font-size:14.5px;color:rgba(245,244,240,.72);line-height:1.55;margin:0\">In Tagen statt Monaten entsteht ein Prototyp — mit Lovable, Claude Code &amp; Co. Du probierst aus, ob es zu deinem Betrieb passt, bevor investiert wird.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#0A0A0A;padding:28px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:14px\">03 / AUFSETZEN<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Richtig aufsetzen<\u002Fh3>\n        <p style=\"font-size:14.5px;color:rgba(245,244,240,.72);line-height:1.55;margin:0\">Wenn der Test überzeugt, bauen wir es sauber: stabil, sicher, in eure Systeme integriert und in den Regelbetrieb übergeben.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#0A0A0A;padding:28px 24px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:#4FBE86;margin-bottom:14px\">04 / BEFÄHIGEN<\u002Fdiv>\n        <h3 style=\"font-size:18px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Team befähigen<\u002Fh3>\n        <p style=\"font-size:14.5px;color:rgba(245,244,240,.72);line-height:1.55;margin:0\">Wir schulen euch, sodass eure Mitarbeiter Workflows selbst anpassen und neue bauen können. Aus Anwendern werden Gestalter.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- contrast: Standard vs Individuell -->\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:rgba(245,244,240,.14);border:1px solid rgba(245,244,240,.14);border-radius:10px;overflow:hidden;margin-top:18px\">\n      <div data-reveal=\"\" style=\"background:#0A0A0A;padding:30px 28px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#8A8A8A;margin-bottom:18px\">VON DER STANGE<\u002Fdiv>\n        <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px\">\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:rgba(245,244,240,.7);line-height:1.5\"><i data-lucide=\"x\" style=\"width:17px;height:17px;color:#8A8A8A;flex:none;margin-top:2px\"><\u002Fi>Kann vieles, passt aber selten genau<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:rgba(245,244,240,.7);line-height:1.5\"><i data-lucide=\"x\" style=\"width:17px;height:17px;color:#8A8A8A;flex:none;margin-top:2px\"><\u002Fi>Ihr passt eure Prozesse ans Tool an<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:rgba(245,244,240,.7);line-height:1.5\"><i data-lucide=\"x\" style=\"width:17px;height:17px;color:#8A8A8A;flex:none;margin-top:2px\"><\u002Fi>Monatliche Lizenzen für Funktionen, die keiner nutzt<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:rgba(245,244,240,.7);line-height:1.5\"><i data-lucide=\"x\" style=\"width:17px;height:17px;color:#8A8A8A;flex:none;margin-top:2px\"><\u002Fi>Daten verteilt über fremde Plattformen<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"background:#0F3B2E;padding:30px 28px\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#4FBE86;margin-bottom:18px\">MASSGESCHNEIDERT<\u002Fdiv>\n        <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px\">\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:#F5F4F0;line-height:1.5\"><i data-lucide=\"check\" style=\"width:17px;height:17px;color:#4FBE86;flex:none;margin-top:2px\"><\u002Fi>Genau auf euren Bedarf gebaut<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:#F5F4F0;line-height:1.5\"><i data-lucide=\"check\" style=\"width:17px;height:17px;color:#4FBE86;flex:none;margin-top:2px\"><\u002Fi>Eigene Workflows &amp; eigenes CRM-System<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:#F5F4F0;line-height:1.5\"><i data-lucide=\"check\" style=\"width:17px;height:17px;color:#4FBE86;flex:none;margin-top:2px\"><\u002Fi>Erst testen, dann investieren<\u002Fli>\n          <li style=\"display:flex;gap:12px;align-items:flex-start;font-size:15px;color:#F5F4F0;line-height:1.5\"><i data-lucide=\"check\" style=\"width:17px;height:17px;color:#4FBE86;flex:none;margin-top:2px\"><\u002Fi>Eure Daten bleiben in eurer Hand<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:26px\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Lovable<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Claude Code<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">n8n / Make<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Eigenes CRM<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Eigene GPTs<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.06em;color:#F5F4F0;border:1px solid rgba(245,244,240,.25);border-radius:100px;padding:6px 13px\">Mitarbeiter-Schulung<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== AUSBLICK 2026 ===================== -->\n<section id=\"ausblick\" style=\"max-width:1180px;margin:0 auto;padding:90px 32px\">\n  <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#0F3B2E;display:flex;align-items:center;gap:14px;margin-bottom:24px\"><span style=\"width:28px;height:1px;background:#0F3B2E\"><\u002Fspan>Ausblick · 2026<\u002Fdiv>\n  <h2 data-reveal=\"\" style=\"font-size:clamp(30px,4.4vw,50px);font-weight:600;line-height:1.06;letter-spacing:-.025em;margin:0;max-width:18ch\">Wohin die Reise geht.<\u002Fh2>\n  <p data-reveal=\"\" style=\"font-size:18px;color:#333;max-width:54ch;margin:22px 0 44px\">Sechs Entwicklungen, die 2026 den Unterschied machen — und schon heute umsetzbar sind.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">01<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Agentic AI<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">Weg vom reinen Chatbot — hin zu autonomen Agenten, die planen, entscheiden und über Tools hinweg handeln.<\u002Fp><\u002Fdiv>\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">02<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Hyperautomation<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">Nicht einzelne Aufgaben, sondern ganze Prozessketten end-to-end — von der Anfrage bis zur Rechnung.<\u002Fp><\u002Fdiv>\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">03<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Voice-AI wird bezahlbar<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">Die Kosten pro Gesprächsminute sind drastisch gefallen — Voice Agents rechnen sich jetzt auch für kleine Betriebe.<\u002Fp><\u002Fdiv>\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">04<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">RAG &amp; Company-GPTs<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">KI antwortet direkt aus dem internen Firmenwissen — mit Quelle, statt aus dem allgemeinen Netz.<\u002Fp><\u002Fdiv>\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">05<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">Browser-Agenten<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">Agenten bedienen Webseiten und Tools wie ein Mensch — und erledigen wiederkehrende Online-Aufgaben selbstständig.<\u002Fp><\u002Fdiv>\n    <div data-reveal=\"\" style=\"border:1px solid rgba(10,10,10,.14);border-radius:9px;background:#fff;padding:26px 24px\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:#0F3B2E;margin-bottom:14px\">06<\u002Fdiv><h3 style=\"font-size:19px;font-weight:600;margin:0 0 8px;letter-spacing:-.01em\">EU AI Act als Vorteil<\u002Fh3><p style=\"font-size:14.5px;color:#595959;line-height:1.55;margin:0\">DSGVO-konforme, regelkonforme Systeme werden zum Wettbewerbsvorsprung — nicht zur Bremse.<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FINAL CTA (INK) ===================== -->\n<section id=\"kontakt\" style=\"background:#0A0A0A;color:#F5F4F0;padding:96px 0\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:0 32px\">\n    <div data-reveal=\"\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#4FBE86;display:flex;align-items:center;gap:14px;margin-bottom:26px\"><span style=\"width:28px;height:1px;background:#4FBE86\"><\u002Fspan>Der erste Schritt<\u002Fdiv>\n    <h2 data-reveal=\"\" style=\"font-size:clamp(32px,4.8vw,58px);font-weight:600;line-height:1.05;letter-spacing:-.025em;margin:0;max-width:18ch\">Welches Konzept passt<br>zu deinem Betrieb?<\u002Fh2>\n    <p data-reveal=\"\" style=\"font-size:19px;color:rgba(245,244,240,.8);max-width:50ch;margin:24px 0 0\">Die Reifegrad-Analyse zeigt dir in wenigen Minuten, wo du heute stehst und welcher Hebel sich zuerst rechnet. Kostenlos, ohne PowerPoint.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:34px\">\n      <a data-cta=\"\" href=\"reifegrad-analyse.html\" style=\"display:inline-flex;align-items:center;gap:10px;text-decoration:none;background:#4FBE86;c Westfalen.<\u002Fp>\n\n      <h3 style=\"font-size:16px;font-weight:600;margin:0 0 8px\">8. SSL-/TLS-Verschlüsselung<\u002Fh3>\n      <p style=\"font-size:15px;line-height:1.7;color:#1A1A1A;margin:0 0 26px\">Diese Seite nutzt aus Sicherheitsgründen und zum Schutz der Übertragung vertraulicher Inhalte eine SSL-/TLS-Verschlüsselung, erkennbar an „https://\" in der Adresszeile deines Browsers.<\u002Fp>\n\n      <p style=\"font-size:13px;line-height:1.6;color:#8A8A8A;margin:30px 0 0;padding-top:18px;border-top:1px solid rgba(10,10,10,.14)\">Hinweis: Diese Datenschutzerklärung ist eine an dein Unternehmen angepasste Vorlage. Vor Veröffentlichung sollte sie an die konkret eingesetzten Dienste (Hoster, Analyse, Formulare, KI-Anbieter) angepasst und rechtlich geprüft werden.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 2400 },\n  &quot;heroWords&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Tools|Folien|Theorie|Buzzwords&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;ctaLabel&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Reifegrad-Analyse starten&quot;, &quot;tsType&quot;: &quot;string&quot; },\n  &quot;ctaHref&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;reifegrad-analyse.html&quot;, &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { dept: 0, legal: null };\n\n  get DEPTS() {\n    return [\n      { n:'01', name:'Vertrieb & Sales', desc:'Vom ersten Lead bis zum Abschluss — ohne dass etwas liegen bleibt.', procs:['Lead-Scoring & Datenanreicherung','Speed-to-Lead · Sofort-Rückruf','Follow-up-Sequenzen automatisch','Deal- & Pipeline-Updates','Reaktivierung alter Leads','Dublettenerkennung','Angebots- & Vertragsversand','KPI-Reporting („148 Leads · 7,3 % C 8n / Make)','KI-Reporting & Daten-Auswertung','Master- & Spezial-Agenten'] },\n      { n:'09', name:'IT & Digitalisierung', desc:'Das Fundament, auf dem alles läuft.', procs:['System- & Tool-Integration','CRM-Setup & Migration','Slack / Notion / Trello einführen','Moderne Website','Datenabgleich & Schnittstellen','Zugriffsrechte & Sicherheit','Cloud-Ablage strukturieren'] }\n    ];\n  }\n\n  renderVals() {\n    const sel = this.state.dept;\n    const depts = this.DEPTS.map((d, i) => ({\n      n: d.n,\n      name: d.name,\n      isActive: i === sel,\n      onClick: () => this.setState({ dept: i }),\n      btnStyle: 'display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:none;border-bottom:1px solid rgba(10,10,10,.1);background:' + (i === sel ? '#F5F4F0' : '#fff') + ';padding:15px 20px;cursor:pointer;font-family:inherit;color:#0A0A0A;border-left:3px solid ' + (i === sel ? '#0F3B2E' : 'transparent') + ';transition:background .2s'\n    }));\n    const active = this.DEPTS[sel];\n    return {\n      depts,\n      activeNum: active.n,\n      activeName: active.name,\n      activeDesc: active.desc,\n      activeProcs: active.procs.map((p, i) => ({ idx: String(i + 1).padStart(2, '0'), name: p })),\n      showImpressum: this.state.legal === 'impressum',\n      showDatenschutz: this.state.legal === 'datenschutz',\n      openImpressum: (e) => { if (e) e.preventDefault(); this.setState({ legal: 'impressum' }); },\n      openDatenschutz: (e) => { if (e) e.preventDefault(); this.setState({ legal: 'datenschutz' }); },\n      closeLegal: () => this.setState({ legal: null }),\n      stop: (e) => { if (e) e.stopPropagation(); }\n    };\n  }\n\n  componentDidMount() {\n    this._timers = [];\n    if (window.lucide) lucide.createIcons();\n    this.applyCta();\n    this.initReveal();\n    this.initCounters();\n    this.startRotator();\n    this.startTerminal();\n    this._onKey = (e) => { if (e.key === 'Escape' && this.state.legal) this.setState({ legal: null }); };\n    document.addEventListener('keydown', this._onKey);\n  }\n\n  componentDidUpdate() {\n    if (window.lucide) lucide.createIcons();\n  }\n\n  applyCta() {\n    const href = this.props.ctaHref;\n    const label = this.props.ctaLabel;\n    if (href) document.querySelectorAll('[data-cta]').forEach(a => a.setAttribute('href', href));\n    if (label) { const l = document.querySelector('[data-cta-label]'); if (l) l.textContent = label; }\n  }\n\n  componentWillUnmount() {\n    (this._timers || []).forEach(t => clearInterval(t));\n    if (this._obs) this._obs.disconnect();\n    if (this._cobs) this._cobs.disconnect();\n    if (this._onKey) document.removeEventListener('keydown', this._onKey);\n  }\n\n  initReveal() {\n    // Visibility must NEVER depend on a CSS animation or rAF: embedded preview\n    // contexts pause animations when the frame is not visible, which would freeze\n    // an entrance animation at opacity 0. So we keep content statically visible\n    // and clear any stale hidden state.\n    document.querySelectorAll('[data-reveal]').forEach(el => {\n      el.style.opacity = '1';\n      el.style.transform = 'none';\n      el.style.animation = 'none';\n    });\n  }\n\n  initCounters() {\n    const nums = Array.from(document.querySelectorAll('[data-count]'));\n    const fmt = (v, target) => (target % 1 === 0) ? Math.round(v).toLocaleString('de-DE') : v.toFixed(1).replace('.', ',');\n    const run = (el) => {\n      if (el._counted) return; el._counted = true;\n      const target = parseFloat(el.getAttribute('data-count'));\n      const dur = 1200, steps = 36; let i = 0;\n      const id = setInterval(() => {\n        i++;\n        const p = Math.min(1, i / steps);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = fmt(target * eased, target);\n        if (p >= 1) { clearInterval(id); el.textContent = fmt(target, target); }\n      }, dur / steps);\n      (this._timers || (this._timers = [])).push(id);\n    };\n    let pending = nums.slice();\n    const check = () => {\n      const vh = window.innerHeight || document.documentElement.clientHeight;\n      pending = pending.filter(el => {\n        const r = el.getBoundingClientRect();\n        if (r.top < vh * 0.9 && r.bottom > 0) { run(el); return false; }\n        return true;\n      });\n      if (pending.length === 0) window.removeEventListener('scroll', onScroll, true);\n    };\n    const onScroll = () => check();\n    window.addEventListener('scroll', onScroll, true);\n    check();\n    [120, 500, 1200].forEach(ms => { const id = setTimeout(check, ms); (this._timers || (this._timers = [])).push(id); });\n    // safety: ensure no counter is ever stuck at 0, even if scroll never fires\n    const finalId = setTimeout(() => { pending.slice().forEach(run); }, 3500);\n    (this._timers || (this._timers = [])).push(finalId);\n  }\n\n  startRotator() {\n    const el = document.querySelector('[data-rot]');\n    if (!el) return;\n    const raw = (this.props.heroWords || 'Tools|Folien|Theorie|Buzzwords');\n    const words = String(raw).split('|').map(w => w.trim()).filter(Boolean);\n    if (words.length < 2) return;\n    // Keep opacity at 1 at all times (a frozen opacity transition in a\n    // non-visible preview frame must never hide the word). Animate with a\n    // transform only, driven by setTimeout (not rAF).\n    el.textContent = words[0];\n    el.style.opacity = '1';\n    el.style.transition = 'transform .3s cubic-bezier(.2,.7,.2,1)';\n    let i = 0;\n    const t = setInterval(() => {\n      el.style.transform = 'translateY(-5px)';\n      const id = setTimeout(() => {\n        i = (i + 1) % words.length;\n        el.textContent = words[i];\n        el.style.opacity = '1';\n        el.style.transform = 'translateY(0)';\n      }, 280);\n      this._timers.push(id);\n    }, 2300);\n    this._timers.push(t);\n  }\n\n  startTerminal() {\n    const body = document.querySelector('[data-term]');\n    const metric = document.querySelector('[data-term-metric]');\n    if (!body) return;\n    const lines = [\n      { t:'09:42:07', x:'☎ Eingehender Anruf · +49 …', c:'#595959' },\n      { t:'09:42:08', x:'Agent: „Guten Tag — wie kann ich helfen?\"', c:'#1A1A1A' },\n      { t:'09:42:13', x:'Anliegen erkannt: Termin vereinbaren', c:'#1A1A1A' },\n      { t:'09:42:15', x:'Kalender geprüft · Di 14:30 frei', c:'#595959' },\n      { t:'09:42:19', x:'✓ Termin gebucht · SMS-Bestätigung', c:'#0F3B2E' },\n      { t:'09:42:20', x:'✓ Lead im CRM angelegt · Follow-up 24 h', c:'#0F3B2E' }\n    ];\n    const sleep = (ms) => new Promise(r => { const id = setTimeout(r, ms); this._timers.push(id); });\n    let cancelled = false;\n    this._termCancel = () => { cancelled = true; };\n    const loop = async () => {\n      while (!cancelled) {\n        body.innerHTML = '';\n        if (metric) metric.textContent = '+0 TERMINE · 0 WARTEZEIT';\n        for (let k = 0; k < lines.length && !cancelled; k++) {\n          const ln = lines[k];\n          const row = document.createElement('div');\n          row.style.opacity = '0';\n          row.style.transition = 'opacity .35s ease';\n          row.style.marginBottom = '2px';\n          row.innerHTML = '<span style=\"color:#8A8A8A\">' + ln.t + '<\u002Fspan>  <span style=\"color:' + ln.c + '\">' + ln.x + '<\u002Fspan>';\n          body.appendChild(row);\n          requestAnimationFrame(() => { row.style.opacity = '1'; });\n          await sleep(720);\n        }\n        if (metric && !cancelled) metric.textContent = '+1 TERMIN · 0 WARTEZEIT';\n        await sleep(2600);\n      }\n    };\n    loop();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
